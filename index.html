<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر شجن | Shajan Store</title>
    <style>
        /* تحسين شكل الصور لتكون واقعية واحترافية */
        .game-card img {
            width: 100px; height: 100px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .game-card img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="wallet-bar">
        رصيدك الحالي: <span id="balance-display" class="balance-display">0</span> نقطة
    </div>

    <script src="https://www.chatbase.co/embed.min.js" chatbotId="YOUR_CHATBOT_ID" domain="www.chatbase.co" defer></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwYtPzGbmUHAcNQj94aJFl-ska_0wPrxE",
            authDomain: "my-store-app-fb8da.firebaseapp.com",
            projectId: "my-store-app-fb8da",
            storageBucket: "my-store-app-fb8da.firebasestorage.app",
            messagingSenderId: "248174922936",
            appId: "1:248174922936:web:e47df54058bf545d84f84d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب الرصيد من Firebase
        async function loadBalance() {
            const docRef = doc(db, "users", "434076");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                document.getElementById("balance-display").innerText = docSnap.data().points;
            }
        }
        loadBalance();
    </script>
</body>
</html>
