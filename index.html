<script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    const auth = getAuth();

    // هذا هو السحر الذي يبحث عن تسجيل الدخول المحفوظ
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            // إذا لم يجد مستخدماً محفوظاً، يرجعه لصفحة الدخول
            window.location.href = "login.html";
        } else {
            console.log("أهلاً بك يا بطل، أنت مسجل بالفعل!");
        }
    });
</script>
