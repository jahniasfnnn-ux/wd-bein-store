<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WD BEIN STORE | المتجر الفخم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; margin: 0; }
        
        /* تصميم الأزرار والبطاقات */
        .header { padding: 50px 20px; text-align: center; background: linear-gradient(180deg, #1a0033, #0a0a0a); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #161616; border-radius: 20px; padding: 15px; border: 2px solid #222; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); }
        .game-card img { width: 100%; border-radius: 15px; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 2.5rem;">WD BEIN STORE</h1>
        <p>الوجهة الأولى للمحترفين</p>
    </div>

    <div class="grid">
        <div class="game-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/3/3d/PUBG_Mobile_Logo.jpg">
            <h3>ببجي</h3>
            <button class="btn-buy" onclick="alert('جارِ الانتقال للطلب...')">اطلب الآن</button>
        </div>
        <div class="game-card">
            <img src="https://upload.wikimedia.org/wikipedia/en/f/f6/Free_Fire_Logo.jpg">
            <h3>فري فاير</h3>
            <button class="btn-buy">اطلب الآن</button>
        </div>
    </div>

</body>
</html>
