<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD BEIN STORE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-right"><span class="nav-title">WD BEIN</span></div>
    </div>
    <div class="hero-section">
        <h1 class="hero-title">تجهيز الحسابات حسب طلبك</h1>
    </div>
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGame('الكل', this)">الكل</button>
        <button class="filter-btn" onclick="filterGame('Free Fire', this)">فري فاير</button>
        <button class="filter-btn" onclick="filterGame('eFootball', this)">eFootball</button>
    </div>
    <div class="products-grid" id="grid">
        <div class="product-card" data-game="Free Fire">
            <h2 class="product-title">حساب فري فاير مخصص</h2>
            <a href="https://t.me/A_G_T4" class="btn-buy-telegram">اطلب حسابك</a>
        </div>
        <div class="product-card" data-game="eFootball">
            <h2 class="product-title">حساب eFootball مخصص</h2>
            <a href="https://t.me/A_G_T4" class="btn-buy-telegram">اطلب حسابك</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
