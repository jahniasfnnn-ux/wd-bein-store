<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD BEIN Store</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Tahoma, sans-serif;
    }

    body {
        background: #0f0f1a;
        color: #fff;
        padding-bottom: 80px;
    }

    .header, .banner, .products, .categories {
        max-width: 1200px;
        margin: 0 auto;
        padding-left: 20px;
        padding-right: 20px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 20px;
        padding-bottom: 20px;
    }

    .logo {
        font-size: 22px;
        font-weight: 700;
        color: #00d9ff;
    }

    .banner {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
        padding: 25px;
        border-radius: 20px;
        margin-top: 10px;
        margin-bottom: 20px;
    }

    .banner h2 {
        font-size: 20px;
        line-height: 1.6;
    }

    .banner h2 span {
        color: #00d9ff;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .product-card {
        background: #1e1e2d;
        border-radius: 18px;
        padding: 15px;
    }
