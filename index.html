<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD BEIN STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; padding: 15px; padding-bottom: 90px; }
        
        /* الهيدر وشريط التنقل العلوي */
        .navbar { background-color: #111827; border-radius: 14px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border: 1px solid #1f2937; }
        .logo-img { height: 45px; width: auto; object-fit: contain; border-radius: 6px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link-btn { background: transparent; border: none; color: #9ca3af; font-size: 14px; font-weight: bold; cursor: pointer; padding: 4px 8px; }
        .nav-link-btn.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; }

        /* شريط التنقل السفلي للموبايل */
        .mobile-tabbar { position: fixed; bottom: 15px; left: 15px; right: 15px; background-color: #111827; border: 1px solid #1f2937; border-radius: 20px; display: flex; justify-content: space-around; padding: 10px; z-index: 1000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 12px; font-weight: bold; background: none; border: none; cursor: pointer; gap: 4px; }
        .tab-item i { font-size: 20px; }
        .tab-item.active { color: #7c3aed; }

        /* الواجهات والفلاتر */
        .page-view { display: none; }
        .page-view.active { display: block !important; }
        .hero-section { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); padding: 35px 15px; border-radius: 18px; border: 1px solid #3b0764; }
        .hero-title { font-size: 26px; margin-bottom: 10px; }
        .hero-subtitle { color: #e9d5ff; font-size: 15px; }

        /* أزرار فلاتر الألعاب */
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 25px; scrollbar-width: none; }
        .filter-btn { background: transparent; color: #ffffff; border: 2px solid #374151; padding: 8px 20px; border-radius: 30px; font-size: 15px; font-weight: bold; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background-color: #7c3aed; border-color: #7c3aed; }

        /* كروت المنتجات والطلبات */
        .products-grid { display: flex; flex-direction: column; gap: 20px; }
        .product-card { background-color: #111827; border-radius: 20px; border: 1px solid #1f2937; padding: 20px; text-align: right; }
        .product-title { font-size: 22px; margin-bottom: 10px; color: #06b6d4; }
        
        .order-textarea { width: 100%; height: 90px; background-color: #1f2937; border: 2px solid #374151; border-radius: 12px; color: white; padding: 12px; font-size: 16px; margin-bottom: 15px; resize: none; }
        .order-textarea:focus { border-color: #7c3aed; outline: none; }
        .btn-buy-telegram { background-color: #0088cc; color: white; text-decoration: none; width: 100%; height: 55px; border-radius: 16px; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; border: none; }

        /* قسم من نحن */
        .feature-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .feature-icon { width: 50px; height: 50px; background-color: #1e1b4b; border: 1px solid #7c3aed; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #7c3aed; font-size: 20px; shrink: 0; }
        .feature-info h3 { font-size: 18px; color: #06b6d4; }
        .feature-info p { color: #9ca3af; font-size: 15px; }
    </style>
</head>
