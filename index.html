<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WD BEIN STORE | متجر الحسابات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --primary-purple: #7c3aed;
            --text-cyan: #06b6d4;
            --text-muted: #9ca3af;
            --danger-red: #ef4444;
            --whatsapp-green: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            padding: 20px 15px;
            width: 100%;
            overflow-x: hidden;
        }

        /* الهيدر العلوي - ضخم وواضح */
        .navbar {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 22px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid #1f2937;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-title {
            color: var(--text-cyan);
            font-size: 32px; /* تكبير ضخم لاسم المتجر */
            font-weight: bold;
        }

        .nav-brand-icon {
            color: var(--text-cyan);
            font-size: 34px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 32px; /* تكبير أيقونات الهيدر */
            color: #ffffff;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-badge {
            position: absolute;
            top: -12px;
            right: -15px;
            background-color: var(--danger-red);
            color: white;
            font-size: 16px;
            padding: 3px 10px;
            border-radius: 50%;
            transition: transform 0.3s;
            font-weight: bold;
        }

        /* بنر العناوين الترحيبي - خطوط عملاقة وقريبة */
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            padding: 45px 20px;
            border-radius: 20px;
            border: 1px solid #3b0764;
        }

        .hero-title {
            font-size: 38px; /* تكبير العنوان الرئيسي */
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #ffffff;
        }

        .hero-subtitle {
            color: #e9d5ff;
            font-size: 20px; /* تكبير الوصف الفرعي */
            line-height: 1.6;
        }

        /* أزرار الفلترة للألعاب - تكبير المسافات والخطوط */
        .filter-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 35px;
            scrollbar-width: none;
        }
        
        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #374151;
            padding: 16px 36px; /* زر عريض وممتد ومريح جداً للضغط */
            border-radius: 30px;
            font-size: 22px; /* تكبير خط أزرار الألعاب لسهولة الاختيار */
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .filter-btn.active {
            background-color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        /* شبكة المنتجات المفرودة */
        .products-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }

        /* بطاقة المنتج - حجم مفرود وكبير وقريب للعين */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 22px;
            border: 1px solid #1f29
