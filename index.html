<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD BEIN Store</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Tahoma, sans-serif;
    }

    body {
        background: #0f0f1a;
        color: #fff;
        padding-bottom: 80px;
    }

    .header, .banner, .products, .categories {
        max-width: 1200px;
        margin: 0 auto;
        padding-left: 20px;
        padding-right: 20px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 20px;
        padding-bottom: 20px;
    }

    .logo {
        font-size: 22px;
        font-weight: 700;
        color: #00d9ff;
    }

    .banner {
        background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%);
        padding: 25px;
        border-radius: 20px;
        margin-top: 10px;
        margin-bottom: 20px;
    }

    .banner h2 {
        font-size: 20px;
        line-height: 1.6;
    }

    .banner h2 span {
        color: #00d9ff;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .product-card {
        background: #1e1e2d;
        border-radius: 18px;
        padding: 15px;
    }

    .product-img {
        width: 100%;
        height: 150px;
        background: #2d1b4e;
        border-radius: 12px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
    }

    .product-title {
        font-size: 14px;
        margin-bottom: 8px;
    }

    .product-price {
        color: #00d9ff;
        font-weight: 700;
        font-size: 18px;
        margin: 10px 0;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #7b2cbf;
        border: none;
        border-radius: 12px;
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
    }

    .btn:active {
        opacity: 0.8;
    }

    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1e1e2d;
        display: flex;
        justify-content: space-around;
        padding: 12px 0;
        border-top: 1px solid #2d2d3d;
    }

    .nav-item {
        text-align: center;
        font-size: 12px;
        color: #888;
    }

    .nav-item.active {
        color: #00d9ff;
    }

    @media (min-width: 768px) {
        .products {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .banner h2 {
            font-size: 24px;
        }
    }
</style>
</head>
<body>

    <div class="header">
        <div>🔍</div>
        <div class="logo">WD BEIN</div>
        <div>☰</div>
    </div>

    <div class="banner">
        <h2>أقوى حسابات الألعاب<br><span>بأفضل الأسعار</span></h2>
    </div>

    <div class="products">
        <div class="product-card">
            <div class="product-img">EA FC</div>
            <div class="product-title">حساب FC Mobile أسطوري</div>
            <div class="product-price">$150</div>
            <button class="btn">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img">PUBG</div>
            <div class="product-title">حساب PUBG ميثيك</div>
            <div class="product-price">$80</div>
            <button class="btn">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img">Siege</div>
            <div class="product-title">حساب R6 Siege نادر</div>
            <div class="product-price">$120</div>
            <button class="btn">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img">COD</div>
            <div class="product-title">حساب Call of Duty</div>
            <div class="product-price">$60</div>
            <button class="btn">إضافة للسلة</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏪 Store</div>
        <div class="nav-item">🔍 Search</div>
        <div class="nav-item">🛒 Cart</div>
        <div class="nav-item">👤 Account</div>
    </div>

</body>
</html>
