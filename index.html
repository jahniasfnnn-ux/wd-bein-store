<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WD BEIN STORE - المتجر المتكامل</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; }
        .page { display: none; padding: 20px; text-align: center; }
        .active { display: block; }
        .btn { background: #7b2cbf; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; margin: 10px; }
        #aymn-box { background: #1a1025; padding: 15px; border-radius: 10px; border-right: 5px solid #7b2cbf; margin: 10px; }
    </style>
</head>
<body>

    <div id="login-page" class="page active">
        <h1>WD BEIN STORE</h1>
        <input type="text" placeholder="اسم المستخدم" style="padding:10px; width:80%; border-radius:10px;"><br><br>
        <input type="password" placeholder="كلمة المرور" style="padding:10px; width:80%; border-radius:10px;"><br><br>
        <button class="btn" onclick="showPage('dashboard-page')">تسجيل الدخول</button>
    </div>

    <div id="dashboard-page" class="page">
        <div id="aymn-box">
            <h3>🤖 المساعد الذكي AYMN</h3>
            <p>أهلاً بك! أنا AYMN، كيف يمكنني مساعدتك في العثور على أفضل الحسابات اليوم؟</p>
        </div>
        <button class="btn" onclick="showPage('accounts-page')">استعراض الحسابات المعروضة</button>
    </div>

    <div id="accounts-page" class="page">
        <h1>حسابات للبيع</h1>
        <div class="card">
            <h3>حساب ببجي "أسطوري"</h3>
            <p>سكنات نادرة، لفل 70، ربط تويتر</p>
            <p style="color: #ffd700;">السعر: 50,000 جنيه</p>
            <button class="btn" onclick="window.location.href='https://t.me/A_G_T4'">شراء الحساب</button>
        </div>
        <button onclick="showPage('dashboard-page')">رجوع للوحة التحكم</button>
    </div>

    <script>
        function showPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
        }
    </script>
</body>
</html>
