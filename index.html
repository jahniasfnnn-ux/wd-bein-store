<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD BEIN STORE | متجر الحسابات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --primary-purple: #7c3aed;
            --text-cyan: #06b6d4;
            --text-muted: #9ca3af;
            --danger-red: #ef4444;
            --whatsapp-green: #25d366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            padding: 15px;
            width: 100%;
        }

        /* الهيدر العلوي - حجم أكبر */
        .navbar {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid #1f2937;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-title {
            color: var(--text-cyan);
            font-size: 28px; /* تكبير اسم المتجر */
            font-weight: bold;
        }

        .nav-brand-icon {
            color: var(--text-cyan);
            font-size: 28px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 26px; /* تكبير الأيقونات في الهيدر */
            color: #ffffff;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
        }

        .cart-badge {
            position: absolute;
            top: -10px;
            right: -12px;
            background-color: var(--danger-red);
            color: white;
            font-size: 14px; /* تكبير عداد السلة */
            padding: 2px 8px;
            border-radius: 50%;
            transition: transform 0.3s;
            font-weight: bold;
        }

        /* بنر العناوين الترحيبي - خطوط ضخمة وقريبة */
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            padding: 35px 20px;
            border-radius: 18px;
            border: 1px solid #3b0764;
        }

        .hero-title {
            font-size: 34px; /* تكبير العنوان الرئيسي ليصبح ضخماً وقريباً */
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #ffffff;
        }
