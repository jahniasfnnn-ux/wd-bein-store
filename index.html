<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD BEIN STORE - بوابة تسجيل الدخول</title>
    <style>
        /* نظام الألوان والتنسيق العام */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; padding: 15px; padding-bottom: 120px; text-align: right; }
        
        /* الهيدر العلوي */
        .navbar { background-color: #111827; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #1f2937; }
        .logo-title { font-size: 24px; color: #a78bfa; font-weight: bold; }
        
        /* شاشة القفل الجدارية (تسجيل الدخول الإجباري) */
        #gatekeeper-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b0f19; z-index: 100000; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow-y: auto; }
        .gatekeeper-logo { font-size: 28px; font-weight: bold; color: #a78bfa; margin-bottom: 5px; text-align: center; }
        .gatekeeper-sub { font-size: 13px; color: #9ca3af; margin-bottom: 25px; text-align: center; }
        
        /* نظام التبديل بين واجهات الموقع بعد الدخول */
        .page-view { display: none; }
        .page-view.active { display: block; }
        
        /* عناصر الواجهات */
        .hero-banner { background: linear-gradient(135deg, #4c1d95, #1e1b4b); border-radius: 16px; padding: 30px 15px; text-align: center; border: 1px solid #7c3aed; margin-bottom: 20px; }
        .hero-banner h1 { font-size: 24px; margin-bottom: 10px; color: #fff; }
        .hero-banner p { font-size: 14px; color: #ddd6fe; margin-bottom: 20px; }
        .btn-primary { background-color: #7c3aed; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 14px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; text-align: center; }
        .stat-box { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px 5px; }
        .stat-val { font-size: 18px; font-weight: bold; color: #a78bfa; }
        .stat-lbl { font-size: 11px; color: #9ca3af; }

        .section-divider { text-align: center; margin: 30px 0 20px 0; position: relative; }
        .section-divider::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #4c1d95; z-index: 1; }
        .section-title { position: relative; z-index: 2; background-color: #7c3aed; color: white; padding: 6px 25px; border-radius: 20px; font-size: 15px; font-weight: bold; display: inline-block; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .product-card { background-color: #1e1b4b; border: 2px solid #4c1d95; border-radius: 16px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .image-container { width: 100%; aspect-ratio: 1/1; background-color: #111827; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; border: 1px solid #374151; overflow: hidden; padding: 10px; }
        .image-container img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px; }
        
        .p-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; min-height: 40px; display: flex; align-items: center; justify-content: center; color: #ffffff; }
        .p-price { font-size: 12px; color: #a78bfa; margin-bottom: 10px; font-weight: bold; }

        .card-input { width: 100%; background: #111827; border: 1px solid #4c1d95; border-radius: 8px; color: white; padding: 8px; font-size: 13px; margin-bottom: 10px; text-align: center; outline: none; }
        .btn-action { background-color: #0088cc; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; }
        
        /* كروت النماذج والمحفظة */
        .auth-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .auth-title { font-size: 16px; font-weight: bold; color: #a78bfa; margin-bottom: 15px; text-align: center; }
        .form-group { margin-bottom: 15px; width: 100%; }
        .form-group label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 6px; }
        .form-input { width: 100%; background: #0b0f19; border: 1px solid #4c1d95; border-radius: 8px; color: white; padding: 11px; font-size: 14px; outline: none; text-align: right; }
        
        .wallet-card { background: linear-gradient(135deg, #1f2937, #111827); border: 2px solid #7c3aed; border-radius: 18px; padding: 25px 20px; text-align: center; margin-bottom: 25px; }
        .wallet-balance { font-size: 32px; font-weight: bold; color: #10b981; margin: 8px 0; font-family: monospace; }
        .deposit-btn { background-color: #10b981; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }

        /* لوحة التحكم للآدمن */
        .admin-section { background-color: #1e1b4b; border: 2px dashed #f59e0b; border-radius: 16px; padding: 15px; margin-top: 25px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 12px; }
