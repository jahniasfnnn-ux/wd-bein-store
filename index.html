<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD BEIN STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نظام الألوان والثيم البنفسجي الغامق الفخم الثابت */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; padding: 15px; padding-bottom: 110px; min-height: 100vh; }
        
        /* الهيدر العلوي للمتجر */
        .navbar { background-color: #111827; border-radius: 12px; padding: 15px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; border: 1px solid #1f2937; }
        .logo-title { font-size: 22px; color: #a78bfa; font-weight: bold; letter-spacing: 0.5px; }
        
        /* نظام التنقل الفوري بين الواجهات */
        .page-view { display: none; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .page-view.active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ================= ستايل الواجهة الرئيسية ================= */
        .hero-banner { background: linear-gradient(135deg, #4c1d95, #1e1b4b); border-radius: 16px; padding: 25px 15px; text-align: center; border: 1px solid #7c3aed; margin-bottom: 20px; }
        .hero-banner h1 { font-size: 24px; color: #ffffff; margin-bottom: 8px; }
        .hero-banner p { font-size: 14px; color: #ddd6fe; margin-bottom: 15px; }
        .btn-primary { background-color: #7c3aed; color: white; border: none; padding: 10px 24px; border-radius: 30px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-box { background-color: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px 5px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; color: #a78bfa; margin-bottom: 3px; }
        .stat-lbl { font-size: 11px; color: #9ca3af; }

        .features-section { background-color: #111827; border-radius: 16px; padding: 15px; border: 1px solid #1f2937; margin-bottom: 20px; }
        .features-section h3 { font-size: 16px; color: #a78bfa; margin-bottom: 15px; border-right: 3px solid #7c3aed; padding-right: 8px; }
        .feat-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; color: #d1d5db; }
        .feat-icon { background-color: #1e1b4b; border: 1px solid #4c1d95; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #a78bfa; flex-shrink: 0; }

        /* ================= ستايل واجهات تسجيل الدخول والحماية للمحفظة ================= */
        .auth-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 25px; }
        .auth-title { font-size: 16px; font-weight: bold; color: #a78bfa; margin-bottom: 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .auth-toggle-text { font-size: 13px; color: #9ca3af; text-align: center; margin-top: 15px; }
        .auth-toggle-link { color: #7c3aed; font-weight: bold; cursor: pointer; text-decoration: underline; }
        
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 5px; }
        .form-input { width: 100%; background: #0b0f19; border: 1px solid #4c1d95; border-radius: 8px; color: white; padding: 10px 12px; font-size: 14px; outline: none; text-align: right; }
        
        /* ================= ستايل واجهة المحفظة الإلكترونية النشطة ================= */
        .wallet-card { background: linear-gradient(135deg, #1f2937, #111827); border: 2px solid #7c3aed; border-radius: 18px; padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); margin-bottom: 25px; position: relative; overflow: hidden; }
        .wallet-lbl { font-size: 14px; color: #9ca3af; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .wallet-balance { font-size: 32px; font-weight: bold; color: #ffffff; margin-bottom: 5px; font-family: monospace; }
        .wallet-currency { font-size: 13px; color: #a78bfa; font-weight: bold; margin-bottom: 10px; }
        .user-badge { font-size: 11px; background-color: #1e1b4b; padding: 4px 10px; border-radius: 20px; color: #ddd6fe; border: 1px solid #4c1d95; display: inline-block; }
        .btn-logout { background: none; border: none; color: #f43f5e; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        
        .deposit-section { background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 15px; }
        .deposit-title { font-size: 15px; font-weight: bold; color: #a78bfa; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .select-input { width: 100%; background: #0b0f19; border: 1px solid #4c1d95; border-radius: 8px; color: white; padding: 10px; font-size: 13px; margin-bottom: 12px; outline: none; }
        .deposit-btn { background-color: #10b981; color: white; border: none; width: 100%; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* ================= ستايل لوحة تحكم المالك السرية ================= */
        .admin-section { background-color: #1e1b4b; border: 2px dashed #7c3aed; border-radius: 16px; padding: 15px; margin-top: 20px; text-align: right; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; color: white; }
        .admin-table th, .admin-table td { border: 1px solid #4c1d95; padding: 8px; text-align: center; }
        .admin-table th { background-color: #111827; color: #a78bfa; }
        .admin-input { width: 80px; background: #0b0f19; border: 1px solid #7c3aed; color: white; border-radius: 4px; padding: 4px; text-align: center; outline: none; }
        .btn-admin-save { background-color: #7c3aed; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* ================= ستايل صفحة الخدمات والفلترة ================= */
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .filter-container::-webkit-scrollbar { height: 4px; }
        .filter-container::-webkit-scrollbar-thumb { background-color: #374151; border-radius: 4px; }
        .filter-btn { background: transparent; color: #ffffff; border: 2px solid #374151; padding: 8px 18px; border-radius: 30px; font-size: 14px; font-weight: bold; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background-color: #7c3aed; border-color: #7c3aed; }
        
        .section-divider { text-align: center; margin: 30px 0 20px 0; position: relative; }
        .section-divider::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px; background: #4c1d95; z-index: 1; }
        .section-title { position: relative; z-index: 2; background-color: #4c1d95; color: white; padding: 6px 25px; border-radius: 20px; font-size: 16px; font-weight: bold; display: inline-block; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .product-card { background-color: #1e1b4b; border: 2px solid #4c1d95; border-radius: 16px; padding: 12px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .image-placeholder { width: 100%; aspect-ratio: 1/1; background-color: #111827; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; border: 1px solid #374151; overflow: hidden; padding: 12px; }
        .image-placeholder img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .multi-img { display: flex; gap: 6px; align-items: center; justify-content: center; width: 100%; }
        .multi-img img { max-width: 45%; max-height: 100%; object-fit: contain; }
        
        .p-title { font-size: 13px; font-weight: bold; color: #ffffff; margin-bottom: 8px; min-height: 38px; display: flex; align-items: center; justify-content: center; line-height: 1.4; }
        .p-price { font-size: 11px; color: #a78bfa; font-weight: bold; margin-bottom: 8px; }

        .card-input { width: 100%; background: #111827; border: 1px solid #4c1d95; border-radius: 8px; color: white; padding: 8px 5px; font-size: 12px; margin-bottom: 8px; text-align: center; outline: none; transition: border-color 0.2s; }
        .card-input:focus { border-color: #7c3aed; }
        .btn-action { background-color: #0088cc; color: white; border: none; width: 100%; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background 0.2s; }
        
        /* شريط التنقل السفلي الثابت والمستقر */
        .mobile-tabbar { position: fixed; bottom: 15px; left: 15px; right: 15px; background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; display: flex; justify-content: space-around; padding: 10px 0; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: #9ca3af; font-size: 11px; background: none; border: none; cursor: pointer; gap: 4px; flex: 1; transition: 0.2s; }
        .tab-item i { font-size: 18px; }
        .tab-item.active { color: #7c3aed; font-weight: bold; }

        /* ستايل المساعد الذكي AI */
        .ai-btn { position: fixed; bottom: 85px; left: 20px; width: 55px; height: 55px; background-color: #7c3aed; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 99999; display: flex; align-items: center; justify-content: center;
