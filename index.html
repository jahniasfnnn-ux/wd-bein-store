<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .game-card { background: #1e1e1e; padding: 15px; border-radius: 20px; text-align: center; }
        .game-card img { width: 100%; height: 140px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-charge { background: #28a745; color: white; }
        .btn-account { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="store-grid">
    <div class="game-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/3/3d/PUBG_Mobile_Logo.jpg" alt="PUBG">
        <h3>ببجي موبايل</h3>
        <div class="btn-group">
            <button class="btn btn-charge" onclick="order('شحن ببجي')">شحن</button>
            <button class="btn btn-account" onclick="order('طلب حساب ببجي')">طلب حساب</button>
        </div>
    </div>

    <div class="game-card">
        <img src="https://upload.wikimedia.org/wikipedia/en/f/f6/Free_Fire_Logo.jpg" alt="Free Fire">
        <h3>فري فاير</h3>
        <div class="btn-group">
            <button class="btn btn-charge" onclick="order('شحن فري فاير')">شحن</button>
            <button class="btn btn-account" onclick="order('طلب حساب فري فاير')">طلب حساب</button>
        </div>
    </div>
</div>

<script>
    function order(service) {
        const url = `https://t.me/A_G_T4?text=${encodeURIComponent('مرحباً، أريد: ' + service)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
